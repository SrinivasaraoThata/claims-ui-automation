name: Healthcare Member Portal - UI Automation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test_claims_portal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Claims UI Tests
      run: |
        pytest tests/ -v
